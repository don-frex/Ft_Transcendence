<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Profile Page</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
      <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> -->
      <link rel="stylesheet" href="../Css/style.css">
   </head>
   <body>
      <div>
         <div class="body-form">
            <nav>
               <a href="Home Page.html">
               <img class="logo" src="../images/TR-logo.png">
               </a>
               <img src="https://cdn.intra.42.fr/users/6346b9909265439cf973f7d7ecb87989/asaber.jpg" class="user-pic"
                  onclick="toggleMenu()">
               <div class="sub-menu-wrap" id="subMenu">
                  <div class="sub-menu">
                     <div class="user-info">
                        <img src="https://cdn.intra.42.fr/users/6346b9909265439cf973f7d7ecb87989/asaber.jpg">
                        <h2>Adnane Saber</h2>
                     </div>
                     <hr>
                     <a href="Profile Page.html" class="sub-menu-link">
                        <img src="../images/user-icon.png">
                        <p> Profile</p>
                        <span>></span>
                     </a>
                     <a href="Profile Settings.html" class="sub-menu-link">
                        <img src="../images/setting-icon.png">
                        <p> Settings</p>
                        <span>></span>
                     </a>
                     <a href="../index.html" class="sub-menu-link">
                        <img src="../images/og-out-icon.png">
                        <p> Log out</p>
                        <span>></span>
                     </a>
                  </div>
               </div>
            </nav>
         </div>
         <div class="Profile_container">
            <img class="profile-img" src="https://avatars.githubusercontent.com/u/70679159">
            <h2>DON-FREX</h2>
            <div class="user-details">
               <div class="info-grid">
                  <div class="info-item">
                     <span>First Name</span>
                     <span>Adnane</span>
                  </div>
                  <div class="info-item">
                     <span>Last Name</span>
                     <span>SaBer</span>
                  </div>
                  <div class="info-item">
                     <span>Email</span>
                     <span>Adnane.SaBer@example.com</span>
                  </div>
                  <div class="info-item">
                     <span>Password</span>
                     <span>**********</span>
                  </div>
               </div>
               <a href="Profile Settings.html" class="edit-button">EDIT</a>
            </div>
            <div class="analyse">
               <div class="sales">
                  <div class="status">
                     <div class="info">
                        <h3>Winnings</h3>
                        <h1>12</h1>
                     </div>
                     <div class="progresss">
                        <svg>
                           <circle cx="38" cy="38" r="36"></circle>
                        </svg>
                        <div class="percentage">
                           <p>+80%</p>
                        </div>
                     </div>
                  </div>
               </div>
               <div class="visits">
                  <div class="status">
                     <div class="info">
                        <h3>Losses</h3>
                        <h1>4</h1>
                     </div>
                     <div class="progresss">
                        <svg>
                           <circle cx="38" cy="38" r="36"></circle>
                        </svg>
                        <div class="percentage">
                           <p>20%</p>
                        </div>
                     </div>
                  </div>
               </div>
               <div class="searches">
                  <div class="status">
                     <div class="info">
                        <h3>Total Played</h3>
                        <h1>16</h1>
                     </div>
                     <div class="progresss">
                        <svg>
                           <circle cx="38" cy="38" r="36"></circle>
                        </svg>
                        <div class="percentage">
                           <p>+21%</p>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <div id="particles-js" class="particles"></div>
      <script src="../particles.js"></script>
      <script src="../particles-config.js"></script>
      <script src="../Js/subMenu.js"></script>
   </body>
</html>
