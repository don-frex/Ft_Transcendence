<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ft_Transcendence</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<link rel="stylesheet" href="../authentification/style.css">
</head>
<body>

	<section class="auth-container">
		<header class="auth-header">
		  <h1 class="auth-title">Two authentication factor</h1>
		  <p class="auth-subtitle">
			For added security, please enter the one-time password<br />
			that was sent
		  </p>
		</header>
		
		<form class="otp-container" role="form">
		  <label class="visually-hidden" for="otp-1">Enter first digit</label>
		  <input type="text" id="otp-1" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 1" required tabindex="0"/>
		  
		  <label class="visually-hidden" for="otp-2">Enter second digit</label>
		  <input type="text" id="otp-2" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 2" required tabindex="1" />
		  
		  <label class="visually-hidden" for="otp-3">Enter third digit</label>
		  <input type="text" id="otp-3" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 3" required tabindex="2" />
		  
		  <label class="visually-hidden" for="otp-4">Enter fourth digit</label>
		  <input type="text" id="otp-4" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 4" required tabindex="3" />
		  
		  <label class="visually-hidden" for="otp-5">Enter fifth digit</label>
		  <input type="text" id="otp-5" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 5" required tabindex="4" />
		  
		  <label class="visually-hidden" for="otp-6">Enter sixth digit</label>
		  <input type="text" id="otp-6" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 6" required tabindex="5" />
		  
		  <a href="Home Page.html" class="continue-btn">Continue</a>
		</form>
	  </section>
	<div id="particles-js" class="particles"></div>
	<script src="../particles.js"></script>
	<script src="../particles-config.js" ></script>
</body>
</html>
