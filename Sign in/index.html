<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
	<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.2/animate.min.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
	<link rel="stylesheet" href="style.css">
	<title>sign in</title>
</head>
<body>
	<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
	<div id="particles-js" class="particles"></div>
	<h1>Hello, world!</h1>
	<div class="container" id="container">
		<div class="form-container sign-up">
			<form>
				<h1>Create Account</h1>
				<div class="social-icons">
					<a href="#" class="icon">
						<i class="fa-brands fa-google"></i></a>
					<a href="#" class="icon"><i class="fa-brands fa-linkedin"></i></a>
				</div>
				<span>Or use your email for regetstration</span>
				<input type="text" placeholder="Name">
				<input type="email" placeholder="Email">
				<input type="password" placeholder="Password">
				<button>
					<a href="../Home Page/index.html">Sign Up</a>
				</button>
			</form>
		</div>
		<div class="form-container sign-in">
			<form>
				<h1>Sign in</h1>
				<div class="social-icons">
					<a href="#" class="icon"><i class="fa-brands fa-google"></i></a>
					<a href="#" class="icon"><i class="fa-brands fa-linkedin"></i></a>
				</div>
				<span>Or use your email for sign in</span>
				<input type="email" placeholder="Email">
				<input type="password" placeholder="Password">
				<a href="#">Forget your password</a>
				<button>
					<a href="../Home Page/index.html">Sign In</a>
				</button>
			</form>
		</div>
		<div class="toggle-container">
			<div class="toggle">
				<div class="toggle-panel toggle-left">
					<h1>Welcome Back!</h1>
					<p>Enter your personal Details to get all sit'features</p>
					<button class="hidden" id="login">Sign In</button>
				</div>
				<div class="toggle-panel toggle-right">
					<h1>Hello Friend!</h1>
					<p>Regester your personal Details to get all sit'features</p>
					<button class="hidden" id="register">Sign Up</button>
				</div>
			</div>
		</div>
	</div>
	<script src="app.js"></script>
</body>
</html>
