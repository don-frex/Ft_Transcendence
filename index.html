<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Creators</title>
	<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
	/>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <audio id="background-music" loop>
      <source
        src="./PS4.mp3"
        type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <button id="play-pause-button">
      <ion-icon class="audio-icon" id="play-music" name="play"></ion-icon>
      <ion-icon
        class="audio-icon hidden"
        id="pause-music"
        name="pause"></ion-icon>
    </button>

    <div id="particles-js" class="particles"></div>

    <div class="container">
      <div class="swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img
              src="https://cdn.intra.42.fr/users/1762786def18acd298d27100e94b6f66/ymaaloum.jpg" />
            <p>Yassine Maaloum</p>
          </div>
          <div class="swiper-slide">
            <img
              src="https://cdn.intra.42.fr/users/6346b9909265439cf973f7d7ecb87989/asaber.jpg" />
            <p>Adnane SaBer</p>
          </div>
          <div class="swiper-slide">
            <img
              src="https://cdn.intra.42.fr/users/cf987edde4ffa352bdff70950565e929/ylaaross.jpg" />
            <p>Yassir Laarossi</p>
          </div>
          <div class="swiper-slide">
            <img
              src="https://cdn.intra.42.fr/users/0f7923d25a44177036c7facfdee25f1e/namorgha.jpg" />
            <p>Nasro Allah Amorgha</p>
          </div>
          <div class="swiper-slide">
            <img
              src="https://cdn.intra.42.fr/users/8bd9577194ba0401fa8dcf1c351aff80/bsouhar.jpg" />
            <p>Badr Eddine Souhar</p>
          </div>
        </div>
        <div class="swiper-pagination"></div>
      </div>
    </div>
  <!-- <a href="https://www.youtube.com/@ecemgokdogan/videos" target="_blank" class="logo"><img src="https://assets.codepen.io/9868786/youtube.webp" alt="HTML tutorial"></a> -->
   <script src="app.js"></script>
</body>
</html>
